<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jia Yi's Character Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0c0c;
      --bg2:         #141414;
      --surface:     #1c1c1c;
      --surface2:    #242424;
      --border:      #2e2e2e;
      --border-red:  #6b1111;
      --red:         #c0202020;
      --red-vivid:   #dc2626;
      --red-dark:    #991b1b;
      --red-glow:    rgba(220,38,38,.18);
      --gold:        #c9943a;
      --gold-light:  #e8b86d;
      --text:        #e8e0d0;
      --text-muted:  #7a6f60;
      --text-dim:    #a89880;
      --radius:      10px;
      --font-title:  'Cinzel Decorative', serif;
      --font-head:   'Cinzel', serif;
      --font-body:   'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(139,0,0,.18) 0%, transparent 60%);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-red); border-radius: 3px; }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #1a0000 0%, #0f0000 60%, transparent 100%);
      border-bottom: 1px solid var(--border-red);
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 32px rgba(180,0,0,.25);
    }
    .header-inner {
      max-width: 1240px;
      margin: 0 auto;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-title);
      font-size: 1.15rem;
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(201,148,58,.5);
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .logo-icon {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }
    .logo-sub {
      font-family: var(--font-head);
      font-size: .65rem;
      color: var(--text-muted);
      letter-spacing: .2em;
      text-transform: uppercase;
      display: block;
      margin-top: 1px;
    }

    .btn-add {
      background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
      color: #f5d0d0;
      border: 1px solid #b91c1c;
      border-radius: 6px;
      padding: 9px 20px;
      font-size: .8125rem;
      font-weight: 600;
      font-family: var(--font-head);
      letter-spacing: .06em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all .2s;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(180,0,0,.3);
    }
    .btn-add:hover {
      background: linear-gradient(135deg, #991b1b 0%, #b91c1c 100%);
      box-shadow: 0 4px 20px rgba(220,38,38,.4);
      transform: translateY(-1px);
    }

    /* ── Main ── */
    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 28px 60px;
    }

    /* ── Divider ornament ── */
    .ornament {
      text-align: center;
      margin-bottom: 28px;
      color: var(--border-red);
      font-size: .75rem;
      letter-spacing: .3em;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ornament::before, .ornament::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-red), transparent);
    }

    /* ── Controls ── */
    .controls { margin-bottom: 24px; display: flex; flex-direction: column; gap: 14px; }

    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text-muted); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 11px 14px 11px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: .9375rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #searchInput::placeholder { color: var(--text-muted); }
    #searchInput:focus {
      border-color: var(--border-red);
      box-shadow: 0 0 0 3px rgba(185,28,28,.18);
    }

    .category-filters { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: var(--font-head);
      font-size: .75rem;
      letter-spacing: .06em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--border-red); color: var(--text-dim); }
    .filter-btn.active {
      background: #2d0000;
      border-color: var(--red-vivid);
      color: #f87171;
      box-shadow: 0 0 8px rgba(220,38,38,.25);
    }

    /* ── Stats ── */
    .stats {
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: 22px;
      font-family: var(--font-head);
      letter-spacing: .04em;
    }
    .stats strong { color: var(--gold); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }
    @media (max-width: 960px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .25s, box-shadow .25s, transform .25s;
      position: relative;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red-dark), var(--red-vivid), var(--red-dark), transparent);
      opacity: 0;
      transition: opacity .25s;
    }
    .card:hover { border-color: var(--border-red); box-shadow: 0 8px 32px rgba(180,0,0,.2); transform: translateY(-3px); }
    .card:hover::before { opacity: 1; }

    /* ── Portrait ── */
    .card-portrait {
      width: 100%;
      height: 160px;
      position: relative;
      overflow: hidden;
      background: #0f0000;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .card-portrait img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .card:hover .card-portrait img { transform: scale(1.04); }
    .card-portrait .portrait-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--border-red);
      transition: color .2s;
    }
    .card-portrait:hover .portrait-placeholder { color: var(--red-vivid); }
    .card-portrait .portrait-placeholder span {
      font-family: var(--font-head);
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .card-portrait .portrait-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s;
    }
    .card-portrait:hover .portrait-overlay { opacity: 1; }
    .portrait-overlay-text {
      font-family: var(--font-head);
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
      display: flex; align-items: center; gap: 6px;
    }
    .portrait-input { display: none; }

    .card-top {
      padding: 18px 18px 14px;
      cursor: pointer;
      user-select: none;
    }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .card-name {
      font-family: var(--font-head);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold-light);
      line-height: 1.3;
      letter-spacing: .02em;
    }
    .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      transition: color .15s, background .15s;
    }
    .btn-icon:hover { background: rgba(255,255,255,.06); }
    .btn-icon.del:hover { color: var(--red-vivid); background: rgba(220,38,38,.12); }
    .btn-icon.edit:hover { color: var(--gold-light); background: rgba(201,148,58,.12); }
    .btn-icon.expand { color: var(--text-muted); }
    .btn-icon.expand.open { color: var(--gold); }

    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge {
      font-family: var(--font-head);
      font-size: .7rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 3px;
      font-weight: 600;
    }
    .badge-class {
      background: #2d0000;
      border: 1px solid #6b1111;
      color: #f87171;
    }
    .badge-race {
      background: #1a1200;
      border: 1px solid #4a3800;
      color: var(--gold);
    }
    .badge-level {
      background: #0d1a0d;
      border: 1px solid #1a4020;
      color: #4ade80;
      margin-left: auto;
    }

    .card-notes-preview {
      font-size: .8125rem;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Expanded sheet ── */
    .card-sheet {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      padding: 18px;
    }
    .card-sheet.open { display: block; }

    .sheet-section { margin-bottom: 16px; }
    .sheet-section:last-child { margin-bottom: 0; }
    .sheet-label {
      font-family: var(--font-head);
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--red-vivid);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sheet-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Stat block */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 4px;
      text-align: center;
    }
    .stat-name { font-family: var(--font-head); font-size: .58rem; letter-spacing: .1em; color: var(--text-muted); text-transform: uppercase; }
    .stat-val { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; color: var(--text); line-height: 1.2; margin-top: 2px; }
    .stat-mod { font-size: .65rem; color: var(--text-muted); }

    /* Info rows */
    .info-row { display: flex; flex-wrap: wrap; gap: 12px; }
    .info-item { min-width: 80px; }
    .info-key { font-family: var(--font-head); font-size: .65rem; letter-spacing: .1em; color: var(--text-muted); text-transform: uppercase; }
    .info-val { font-size: .875rem; color: var(--text-dim); margin-top: 2px; font-weight: 500; }

    .sheet-text {
      font-size: .8125rem;
      color: var(--text-dim);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 72px 24px;
      color: var(--text-muted);
    }
    .empty svg { opacity: .25; margin-bottom: 18px; }
    .empty strong { display: block; font-family: var(--font-head); font-size: 1.1rem; color: var(--text-dim); letter-spacing: .04em; }
    .empty p { font-size: .875rem; margin-top: 6px; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border-red);
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0,0,0,.7), 0 0 40px rgba(180,0,0,.15);
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      transform: translateY(20px) scale(.97);
      transition: transform .25s;
    }
    .modal-backdrop.open .modal { transform: translateY(0) scale(1); }

    .modal-title {
      font-family: var(--font-title);
      font-size: 1rem;
      color: var(--gold-light);
      margin-bottom: 22px;
      letter-spacing: .04em;
      text-shadow: 0 0 16px rgba(201,148,58,.4);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-family: var(--font-head);
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    label .req { color: var(--red-vivid); }
    input[type=text], input[type=number], select, textarea {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: .875rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type=number] { -moz-appearance: textfield; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--border-red);
      box-shadow: 0 0 0 3px rgba(185,28,28,.2);
    }
    select option { background: var(--surface); }
    textarea { resize: vertical; min-height: 70px; }
    .field-error { font-size: .72rem; color: #f87171; margin-top: 4px; display: none; }
    .field-error.show { display: block; }

    .stat-input-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .stat-input-group { text-align: center; }
    .stat-input-group label {
      font-size: .6rem;
      text-align: center;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }
    .stat-input-group input {
      text-align: center;
      padding: 7px 4px;
      font-family: var(--font-head);
      font-size: .95rem;
      font-weight: 600;
    }

    .section-divider {
      font-family: var(--font-head);
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--red-vivid);
      margin: 20px 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-divider::before, .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .btn-cancel {
      padding: 9px 20px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-head);
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-save {
      padding: 9px 24px;
      border-radius: 6px;
      border: 1px solid #b91c1c;
      background: linear-gradient(135deg, #7f1d1d, #991b1b);
      color: #fecaca;
      font-family: var(--font-head);
      font-size: .75rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
      box-shadow: 0 2px 12px rgba(180,0,0,.3);
    }
    .btn-save:hover { background: linear-gradient(135deg, #991b1b, #b91c1c); box-shadow: 0 4px 20px rgba(220,38,38,.4); }

    @media (max-width: 560px) {
      main { padding: 20px 16px 48px; }
      header { padding: 0 16px; }
      .modal { padding: 20px 16px; }
      .logo-text { display: none; }
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
      .stat-input-grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ── D&D Sheet expanded ── */
    .dnd-combat-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-bottom: 14px;
    }
    .dnd-combat-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 3px;
      text-align: center;
    }
    .dnd-combat-val {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .dnd-combat-label {
      font-family: var(--font-head);
      font-size: .52rem;
      letter-spacing: .06em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .dnd-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .dnd-save-list, .dnd-skill-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .dnd-save-row, .dnd-skill-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .dnd-save-mod, .dnd-skill-mod {
      font-family: var(--font-head);
      font-size: .68rem;
      font-weight: 700;
      color: var(--gold);
      min-width: 26px;
      text-align: right;
      flex-shrink: 0;
    }
    .dnd-save-name, .dnd-skill-name {
      font-size: .68rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Spell slots */
    .dnd-spell-slots { display: flex; flex-direction: column; gap: 5px; }
    .dnd-slot-row { display: flex; align-items: center; gap: 7px; }
    .dnd-slot-label {
      font-family: var(--font-head);
      font-size: .6rem;
      letter-spacing: .06em;
      color: var(--text-muted);
      text-transform: uppercase;
      min-width: 24px;
      flex-shrink: 0;
    }
    .dnd-slot-bubbles { display: flex; gap: 5px; flex-wrap: wrap; }
    .dnd-slot-bubble {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1.5px solid var(--border-red);
      background: transparent;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
    }
    .dnd-slot-bubble:hover { border-color: var(--red-vivid); }
    .dnd-slot-bubble.used {
      background: var(--red-vivid);
      border-color: var(--red-dark);
    }
    .sheet-label-sub {
      font-family: var(--font-body);
      font-size: .55rem;
      color: var(--text-muted);
      letter-spacing: .04em;
      text-transform: none;
      font-weight: 400;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <!-- D20 icon -->
      <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="32,4 60,20 60,44 32,60 4,44 4,20" stroke="#c9943a" stroke-width="2" fill="#1a0000"/>
        <polygon points="32,4 60,20 32,28" fill="rgba(180,0,0,.25)" stroke="#6b1111" stroke-width="1"/>
        <polygon points="60,20 60,44 32,28" fill="rgba(180,0,0,.15)" stroke="#6b1111" stroke-width="1"/>
        <polygon points="60,44 32,60 32,28" fill="rgba(180,0,0,.25)" stroke="#6b1111" stroke-width="1"/>
        <polygon points="32,60 4,44 32,28" fill="rgba(180,0,0,.15)" stroke="#6b1111" stroke-width="1"/>
        <polygon points="4,44 4,20 32,28" fill="rgba(180,0,0,.25)" stroke="#6b1111" stroke-width="1"/>
        <polygon points="4,20 32,4 32,28" fill="rgba(180,0,0,.15)" stroke="#6b1111" stroke-width="1"/>
        <text x="32" y="38" text-anchor="middle" font-family="Cinzel,serif" font-size="16" font-weight="700" fill="#c9943a">20</text>
      </svg>
      <div class="logo-text">
        Jia Yi's Character Vault
        <span class="logo-sub">Roll for glory</span>
      </div>
    </div>
    <button class="btn-add" id="btnOpenModal">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Character
    </button>
  </div>
</header>

<main>
  <div class="ornament">⚔ &nbsp; The Vault &nbsp; ⚔</div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name or class…" autocomplete="off" />
    </div>
    <div class="category-filters" id="categoryFilters"></div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
</main>

<!-- ── Modal ── -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-title" id="modalTitle">✦ New Character</div>
    <form id="charForm" novalidate>

      <!-- Basic info -->
      <div class="form-row">
        <div class="form-group">
          <label for="fName">Name <span class="req">*</span></label>
          <input type="text" id="fName" placeholder="Aldric Ironforge" maxlength="80" />
          <div class="field-error" id="errName">A name is required.</div>
        </div>
        <div class="form-group">
          <label for="fLevel">Level <span class="req">*</span></label>
          <input type="number" id="fLevel" placeholder="1" min="1" max="20" value="1" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fClass">Class <span class="req">*</span></label>
          <input type="text" id="fClass" placeholder="Fighter" maxlength="40" list="classList" />
          <datalist id="classList">
            <option value="Barbarian"><option value="Bard"><option value="Cleric">
            <option value="Druid"><option value="Fighter"><option value="Monk">
            <option value="Paladin"><option value="Ranger"><option value="Rogue">
            <option value="Sorcerer"><option value="Warlock"><option value="Wizard">
          </datalist>
          <div class="field-error" id="errClass">A class is required.</div>
        </div>
        <div class="form-group">
          <label for="fRace">Race <span class="req">*</span></label>
          <input type="text" id="fRace" placeholder="Human" maxlength="40" list="raceList" />
          <datalist id="raceList">
            <option value="Human"><option value="Elf"><option value="Dwarf">
            <option value="Halfling"><option value="Gnome"><option value="Half-Elf">
            <option value="Half-Orc"><option value="Tiefling"><option value="Dragonborn">
          </datalist>
          <div class="field-error" id="errRace">A race is required.</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fAlignment">Alignment</label>
          <select id="fAlignment">
            <option value="">— Choose —</option>
            <option>Lawful Good</option><option>Neutral Good</option><option>Chaotic Good</option>
            <option>Lawful Neutral</option><option>True Neutral</option><option>Chaotic Neutral</option>
            <option>Lawful Evil</option><option>Neutral Evil</option><option>Chaotic Evil</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fHP">Max Hit Points</label>
          <input type="number" id="fHP" placeholder="10" min="1" max="999" />
        </div>
      </div>

      <!-- Ability scores -->
      <div class="section-divider">Ability Scores</div>
      <div class="stat-input-grid">
        <div class="stat-input-group">
          <label for="fStr">STR</label>
          <input type="number" id="fStr" value="10" min="1" max="30" />
        </div>
        <div class="stat-input-group">
          <label for="fDex">DEX</label>
          <input type="number" id="fDex" value="10" min="1" max="30" />
        </div>
        <div class="stat-input-group">
          <label for="fCon">CON</label>
          <input type="number" id="fCon" value="10" min="1" max="30" />
        </div>
        <div class="stat-input-group">
          <label for="fInt">INT</label>
          <input type="number" id="fInt" value="10" min="1" max="30" />
        </div>
        <div class="stat-input-group">
          <label for="fWis">WIS</label>
          <input type="number" id="fWis" value="10" min="1" max="30" />
        </div>
        <div class="stat-input-group">
          <label for="fCha">CHA</label>
          <input type="number" id="fCha" value="10" min="1" max="30" />
        </div>
      </div>

      <!-- Character details -->
      <div class="section-divider">Character Details</div>
      <div class="form-group">
        <label for="fBackstory">Backstory</label>
        <textarea id="fBackstory" placeholder="Where do they come from? What drives them?" maxlength="1200"></textarea>
      </div>
      <div class="form-group">
        <label for="fEquipment">Equipment &amp; Spells</label>
        <textarea id="fEquipment" placeholder="Longsword +1, Chain mail, Spell: Fireball…" maxlength="600"></textarea>
      </div>
      <div class="form-group">
        <label for="fNotes">Notes</label>
        <textarea id="fNotes" placeholder="Personality traits, flaws, ideals, bonds…" maxlength="600"></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
        <button type="submit" class="btn-save">Forge Character</button>
      </div>
    </form>
  </div>
</div>

<script>
  const STORAGE_KEY = 'dnd_vault_v1';

  const SAMPLES = [
    {
      name: 'Aldric Ironforge', class: 'Fighter', race: 'Dwarf', level: 8,
      alignment: 'Lawful Good', hp: 72,
      stats: { str: 18, dex: 12, con: 16, int: 10, wis: 13, cha: 9 },
      backstory: 'A veteran of the Ironpeak Wars, Aldric lost his clan to a dragon raid and now wanders the realm hunting monsters that prey on the innocent. He carries the broken hilt of his father\'s sword as a reminder of his oath.',
      equipment: 'Battleaxe +2, Dwarven Plate Armor, Shield of the Mountain, 3× Healing Potions, Climbing Kit',
      notes: 'Trait: Methodical and stubborn. Flaw: Refuses to retreat. Bond: Will avenge clan Ironforge.',
    },
    {
      name: 'Seraphina Nightwhisper', class: 'Wizard', race: 'Elf', level: 6,
      alignment: 'Chaotic Good', hp: 38,
      stats: { str: 7, dex: 15, con: 12, int: 19, wis: 14, cha: 13 },
      backstory: 'Expelled from the Arcane Academy for "unsanctioned experimentation", Seraphina now sells her services as a mercenary mage. She\'s studying ancient forbidden magic and getting closer to something she probably shouldn\'t.',
      equipment: 'Staff of the Magi, Spellbook, Fireball, Lightning Bolt, Counterspell, Mirror Image, Wand of Magic Missiles',
      notes: 'Trait: Dangerously curious. Flaw: Overconfident in her own power. Bond: Must uncover what the Academy is hiding.',
    },
    {
      name: 'Grimshaw Darkblade', class: 'Rogue', race: 'Half-Orc', level: 5,
      alignment: 'Chaotic Neutral', hp: 40,
      stats: { str: 14, dex: 18, con: 13, int: 12, wis: 10, cha: 11 },
      backstory: 'Raised in the gutters of Ashveil City, Grimshaw never knew honest work. The Thieves\' Guild gave him a home — and a debt he\'s still paying off in blood.',
      equipment: 'Rapier of Wounding, 2× Daggers, Leather Armor +1, Thieves\' Tools, Bag of Tricks',
      notes: 'Trait: Never shows weakness. Flaw: Trusts no one fully. Bond: Owes an impossible debt to the Guild.',
    },
    {
      name: 'Brother Matthias', class: 'Cleric', race: 'Human', level: 7,
      alignment: 'Lawful Neutral', hp: 58,
      stats: { str: 13, dex: 9, con: 14, int: 12, wis: 18, cha: 15 },
      backstory: 'A former soldier who found faith on the battlefield when he was the only survivor of a massacre. He now serves the God of Death — not as a villain, but as a shepherd of souls who ensures the dead reach their rest.',
      equipment: 'Mace of Disruption, Shield, Holy Symbol, Spiritual Weapon, Cure Wounds, Revivify, Animate Dead (reluctantly)',
      notes: 'Trait: Speaks plainly; dislikes euphemism. Flaw: Sees death as inevitable, sometimes fatalistic. Bond: Every soul deserves a proper passage.',
    },
    {
      name: 'Fern Goodbarrel', class: 'Bard', race: 'Halfling', level: 4,
      alignment: 'Chaotic Good', hp: 30,
      stats: { str: 8, dex: 16, con: 12, int: 13, wis: 11, cha: 18 },
      backstory: 'Fern ran away from her quiet village at sixteen with nothing but a lute and big dreams. She\'s collected more stories than gold, and that suits her just fine. Every hero needs a chronicler.',
      equipment: 'Lute of Illusions, Rapier, Leather Armor, Vicious Mockery, Healing Word, Hypnotic Pattern, Bardic Inspiration (d8)',
      notes: 'Trait: Turns everything into a song. Flaw: Compulsively exaggerates. Bond: Every adventure belongs in an epic.',
    },
    {
      name: 'Korrax the Unbroken', class: 'Barbarian', race: 'Dragonborn', level: 9,
      alignment: 'Chaotic Neutral', hp: 98,
      stats: { str: 20, dex: 13, con: 18, int: 8, wis: 10, cha: 12 },
      backstory: 'Korrax survived a gladiatorial arena for six years before escaping. He kept the chains as a reminder. He worships no god, follows no king, and answers to no one — but he has a strange habit of protecting children and strays.',
      equipment: 'Greataxe +2, Broken Chains (worn as armour decoration), Amulet of Health, Rage (4×/day), Reckless Attack, Brutal Critical',
      notes: 'Trait: Speaks in short sentences. Often unintentionally intimidating. Flaw: Pride above strategy. Bond: Freedom is the only thing worth dying for.',
    },
  ];

  let characters = [];
  let activeClass = 'All';
  let searchQuery = '';
  let expandedIds = new Set();
  let editingId = null;

  // ── Storage ────────────────────────────────────────────────
  function load() {
    try { characters = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { characters = []; }
    if (!characters.length) seed();
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(characters)); }
  function seed() {
    characters = SAMPLES.map(s => ({ ...s, id: uid(), createdAt: new Date().toISOString() }));
    save();
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

  // ── Filter ─────────────────────────────────────────────────
  function classes() { return ['All', ...Array.from(new Set(characters.map(c => c.class))).sort()]; }
  function filtered() {
    const q = searchQuery.toLowerCase();
    return characters.filter(c => {
      const matchQ = !q || c.name.toLowerCase().includes(q) || c.class.toLowerCase().includes(q);
      const matchC = activeClass === 'All' || c.class === activeClass;
      return matchQ && matchC;
    });
  }

  // ── Render ─────────────────────────────────────────────────
  function render() { renderFilters(); renderGrid(); renderStats(); }

  function renderFilters() {
    document.getElementById('categoryFilters').innerHTML = classes().map(c =>
      `<button class="filter-btn${c === activeClass ? ' active' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`
    ).join('');
  }

  function renderGrid() {
    const items = filtered();
    const el = document.getElementById('grid');
    if (!items.length) {
      el.innerHTML = `<div class="empty">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
          <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/><line x1="12" y1="22" x2="12" y2="15.5"/>
          <polyline points="2,8.5 12,15.5 22,8.5"/>
        </svg>
        <strong>No Characters Found</strong>
        <p>${searchQuery || activeClass !== 'All' ? 'Try a different search or class filter.' : 'Click "New Character" to begin your legend.'}</p>
      </div>`;
      return;
    }
    el.innerHTML = items.map(c => cardHTML(c)).join('');
  }

  function mod(v) { const m = Math.floor((v - 10) / 2); return (m >= 0 ? '+' : '') + m; }

  function cardHTML(c) {
    const open = expandedIds.has(c.id);
    const statKeys = ['str','dex','con','int','wis','cha'];
    const statNames = ['STR','DEX','CON','INT','WIS','CHA'];
    const pb = Math.floor((c.level - 1) / 4) + 2;
    const FULL_CASTER_SLOTS = [
      [2,0,0,0,0,0,0,0,0],[3,0,0,0,0,0,0,0,0],[4,2,0,0,0,0,0,0,0],
      [4,3,0,0,0,0,0,0,0],[4,3,2,0,0,0,0,0,0],[4,3,3,0,0,0,0,0,0],
      [4,3,3,1,0,0,0,0,0],[4,3,3,2,0,0,0,0,0],[4,3,3,3,1,0,0,0,0],
      [4,3,3,3,2,0,0,0,0],[4,3,3,3,2,1,0,0,0],[4,3,3,3,2,1,0,0,0],
      [4,3,3,3,2,1,1,0,0],[4,3,3,3,2,1,1,0,0],[4,3,3,3,2,1,1,1,0],
      [4,3,3,3,2,1,1,1,0],[4,3,3,3,2,1,1,1,1],[4,3,3,3,3,1,1,1,1],
      [4,3,3,3,3,2,1,1,1],[4,3,3,3,3,2,2,1,1],
    ];
    const slots = FULL_CASTER_SLOTS[Math.min(Math.max(c.level, 1), 20) - 1];
    const ordinals = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];
    const spellSlotsHTML = `
      <div class="sheet-section">
        <div class="sheet-label">Spell Slots<span class="sheet-label-sub">(full caster reference — click to mark used)</span></div>
        <div class="dnd-spell-slots">
          ${slots.map((count, i) => count > 0 ? `
            <div class="dnd-slot-row">
              <span class="dnd-slot-label">${ordinals[i]}</span>
              <div class="dnd-slot-bubbles">
                ${Array.from({length: count}, (_, j) =>
                  `<div class="dnd-slot-bubble" data-slot-char="${c.id}" data-slot-level="${i}" data-slot-idx="${j}"></div>`
                ).join('')}
              </div>
            </div>` : '').join('')}
        </div>
      </div>`;
    const SKILLS = [
      ['Acrobatics','dex'],['Animal Handling','wis'],['Arcana','int'],
      ['Athletics','str'],['Deception','cha'],['History','int'],
      ['Insight','wis'],['Intimidation','cha'],['Investigation','int'],
      ['Medicine','wis'],['Nature','int'],['Perception','wis'],
      ['Performance','cha'],['Persuasion','cha'],['Religion','int'],
      ['Sleight of Hand','dex'],['Stealth','dex'],['Survival','wis'],
    ];
    return `
      <div class="card" data-id="${c.id}">
        <div class="card-portrait" data-photo-id="${c.id}" title="Click to upload portrait">
          <input type="file" class="portrait-input" accept="image/*" data-photo-input="${c.id}" />
          ${c.photo
            ? `<img src="${c.photo}" alt="${esc(c.name)} portrait" />
               <div class="portrait-overlay">
                 <div class="portrait-overlay-text">
                   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                   Change Photo
                 </div>
               </div>`
            : `<div class="portrait-placeholder">
                 <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                 <span>Upload Portrait</span>
               </div>`
          }
        </div>
        <div class="card-top" data-expand="${c.id}">
          <div class="card-header">
            <div class="card-name">${esc(c.name)}</div>
            <div class="card-actions">
              <button class="btn-icon expand${open ? ' open' : ''}" data-expand="${c.id}" title="Expand sheet" aria-label="Expand character sheet">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                  ${open
                    ? '<polyline points="18 15 12 9 6 15"/>'
                    : '<polyline points="6 9 12 15 18 9"/>'}
                </svg>
              </button>
              <button class="btn-icon edit" data-edit="${c.id}" title="Edit character" aria-label="Edit ${esc(c.name)}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn-icon del" data-id="${c.id}" title="Delete character" aria-label="Delete ${esc(c.name)}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="card-meta">
            <span class="badge badge-class">${esc(c.class)}</span>
            <span class="badge badge-race">${esc(c.race)}</span>
            <span class="badge badge-level">Lvl ${c.level}</span>
          </div>
          ${c.notes ? `<div class="card-notes-preview">${esc(c.notes)}</div>` : ''}
        </div>

        <div class="card-sheet${open ? ' open' : ''}">

          <!-- Combat Stats Strip -->
          <div class="dnd-combat-row">
            <div class="dnd-combat-stat">
              <div class="dnd-combat-val">—</div>
              <div class="dnd-combat-label">Armor Class</div>
            </div>
            <div class="dnd-combat-stat">
              <div class="dnd-combat-val">${mod(c.stats.dex)}</div>
              <div class="dnd-combat-label">Initiative</div>
            </div>
            <div class="dnd-combat-stat">
              <div class="dnd-combat-val">30 ft</div>
              <div class="dnd-combat-label">Speed</div>
            </div>
            <div class="dnd-combat-stat">
              <div class="dnd-combat-val">${c.hp || '—'}</div>
              <div class="dnd-combat-label">Max HP</div>
            </div>
            <div class="dnd-combat-stat">
              <div class="dnd-combat-val">+${pb}</div>
              <div class="dnd-combat-label">Prof. Bonus</div>
            </div>
          </div>

          <!-- Ability Scores -->
          <div class="sheet-section">
            <div class="sheet-label">Ability Scores</div>
            <div class="stat-grid">
              ${statKeys.map((k,i) => `
                <div class="stat-box">
                  <div class="stat-name">${statNames[i]}</div>
                  <div class="stat-val">${c.stats[k]}</div>
                  <div class="stat-mod">${mod(c.stats[k])}</div>
                </div>`).join('')}
            </div>
          </div>

          <!-- Saving Throws + Skills -->
          <div class="dnd-two-col">
            <div>
              <div class="sheet-label">Saving Throws</div>
              <div class="dnd-save-list">
                ${statKeys.map((k,i) => `
                  <div class="dnd-save-row">
                    <span class="dnd-save-mod">${mod(c.stats[k])}</span>
                    <span class="dnd-save-name">${statNames[i]}</span>
                  </div>`).join('')}
              </div>
            </div>
            <div>
              <div class="sheet-label">Skills</div>
              <div class="dnd-skill-list">
                ${SKILLS.map(([name, stat]) => `
                  <div class="dnd-skill-row">
                    <span class="dnd-skill-mod">${mod(c.stats[stat])}</span>
                    <span class="dnd-skill-name">${name}</span>
                  </div>`).join('')}
              </div>
            </div>
          </div>

          <!-- Spell Slots -->
          ${spellSlotsHTML}

          <!-- Features & Equipment -->
          <div class="dnd-two-col">
            <div>
              <div class="sheet-label">Features &amp; Traits</div>
              <div class="sheet-text">${c.notes ? esc(c.notes) : '<span style="color:var(--text-muted);font-style:italic">—</span>'}</div>
            </div>
            <div>
              <div class="sheet-label">Equipment</div>
              <div class="sheet-text">${c.equipment ? esc(c.equipment) : '<span style="color:var(--text-muted);font-style:italic">—</span>'}</div>
            </div>
          </div>

          <!-- Backstory -->
          ${c.backstory ? `
          <div class="sheet-section">
            <div class="sheet-label">Backstory</div>
            <div class="sheet-text">${esc(c.backstory)}</div>
          </div>` : ''}

        </div>
      </div>`;
  }

  function renderStats() {
    const total = characters.length, shown = filtered().length;
    document.getElementById('stats').innerHTML = total
      ? `Showing <strong>${shown}</strong> of <strong>${total}</strong> character${total !== 1 ? 's' : ''}`
      : '';
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Grid events ────────────────────────────────────────────
  document.getElementById('grid').addEventListener('click', e => {
    // Delete
    const del = e.target.closest('.btn-icon.del');
    if (del) {
      characters = characters.filter(c => c.id !== del.dataset.id);
      expandedIds.delete(del.dataset.id);
      save(); render(); return;
    }
    // Spell slot bubble toggle
    const bubble = e.target.closest('.dnd-slot-bubble');
    if (bubble) { bubble.classList.toggle('used'); return; }

    // Portrait upload
    const portrait = e.target.closest('.card-portrait');
    if (portrait) {
      const inp = portrait.querySelector('.portrait-input');
      if (inp) inp.click();
      return;
    }

    // Edit
    const editBtn = e.target.closest('.btn-icon.edit');
    if (editBtn) {
      openEditModal(editBtn.dataset.edit); return;
    }
    // Expand toggle
    const exp = e.target.closest('[data-expand]');
    if (exp) {
      const id = exp.dataset.expand;
      expandedIds.has(id) ? expandedIds.delete(id) : expandedIds.add(id);
      render(); return;
    }
  });

  // ── Portrait file input ────────────────────────────────────
  document.getElementById('grid').addEventListener('change', e => {
    const inp = e.target.closest('.portrait-input');
    if (!inp) return;
    const id = inp.dataset.photoInput;
    const file = inp.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const idx = characters.findIndex(c => c.id === id);
      if (idx === -1) return;
      characters[idx].photo = ev.target.result;
      save(); render();
    };
    reader.readAsDataURL(file);
  });

  // ── Filters / search ───────────────────────────────────────
  document.getElementById('categoryFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (btn) { activeClass = btn.dataset.cat; render(); }
  });
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim(); render();
  });

  // ── Modal ──────────────────────────────────────────────────
  const backdrop = document.getElementById('modalBackdrop');

  const openModal = () => {
    editingId = null;
    document.getElementById('modalTitle').textContent = '✦ New Character';
    document.querySelector('.btn-save').textContent = 'Forge Character';
    backdrop.classList.add('open');
    document.getElementById('fName').focus();
  };

  const closeModal = () => {
    backdrop.classList.remove('open');
    document.getElementById('charForm').reset();
    clearErrors();
    editingId = null;
  };

  const clearErrors = () => document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'));

  function openEditModal(id) {
    const c = characters.find(x => x.id === id);
    if (!c) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '✦ Edit Character';
    document.querySelector('.btn-save').textContent = 'Save Changes';

    document.getElementById('fName').value       = c.name;
    document.getElementById('fLevel').value      = c.level;
    document.getElementById('fClass').value      = c.class;
    document.getElementById('fRace').value       = c.race;
    document.getElementById('fAlignment').value  = c.alignment || '';
    document.getElementById('fHP').value         = c.hp || '';
    document.getElementById('fStr').value        = c.stats.str;
    document.getElementById('fDex').value        = c.stats.dex;
    document.getElementById('fCon').value        = c.stats.con;
    document.getElementById('fInt').value        = c.stats.int;
    document.getElementById('fWis').value        = c.stats.wis;
    document.getElementById('fCha').value        = c.stats.cha;
    document.getElementById('fBackstory').value  = c.backstory || '';
    document.getElementById('fEquipment').value  = c.equipment || '';
    document.getElementById('fNotes').value      = c.notes || '';

    clearErrors();
    backdrop.classList.add('open');
    document.getElementById('fName').focus();
  }

  document.getElementById('btnOpenModal').addEventListener('click', openModal);
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal(); });

  // ── Form submit ────────────────────────────────────────────
  document.getElementById('charForm').addEventListener('submit', e => {
    e.preventDefault(); clearErrors();
    const g = id => document.getElementById(id).value.trim();
    const n = id => parseInt(document.getElementById(id).value) || 10;

    const name = g('fName'), cls = g('fClass'), race = g('fRace');
    let valid = true;
    if (!name) { document.getElementById('errName').classList.add('show'); valid = false; }
    if (!cls)  { document.getElementById('errClass').classList.add('show'); valid = false; }
    if (!race) { document.getElementById('errRace').classList.add('show'); valid = false; }
    if (!valid) return;

    const lvl = Math.min(20, Math.max(1, parseInt(g('fLevel')) || 1));
    const hp  = Math.max(1, parseInt(g('fHP')) || 0) || undefined;

    const charData = {
      name, class: cls, race, level: lvl,
      alignment: g('fAlignment') || '',
      hp: hp || '',
      stats: { str: n('fStr'), dex: n('fDex'), con: n('fCon'), int: n('fInt'), wis: n('fWis'), cha: n('fCha') },
      backstory: g('fBackstory'),
      equipment: g('fEquipment'),
      notes: g('fNotes'),
    };

    if (editingId) {
      const idx = characters.findIndex(x => x.id === editingId);
      if (idx !== -1) characters[idx] = { ...characters[idx], ...charData };
    } else {
      characters.unshift({ id: uid(), createdAt: new Date().toISOString(), ...charData });
      activeClass = 'All'; searchQuery = '';
      document.getElementById('searchInput').value = '';
    }

    save(); closeModal(); render();
  });

  // ── Init ───────────────────────────────────────────────────
  load(); render();
</script>
</body>
</html>
